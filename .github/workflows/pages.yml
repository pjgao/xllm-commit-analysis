name: Update xLLM report and deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout report repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build official xLLM data
        run: npm run build:data

      - name: Commit data refresh
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- site/data/official-xllm.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/official-xllm.json
          git commit -m "chore: refresh xllm report data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
